name: Manual Post (12:05 KST)

on:
  # schedule:  # 2026-07-19 EC2 크론 이관 — 재개 시 주석 해제
    # - cron: '17 2 * * *'   # 11:17 KST — 지연 시 저녁(21시대) 도착, 정시면 생략
    # - cron: '17 5 * * *'   # 14:17 KST — 정시면 19시까지 대기 후 게시
    # - cron: '17 8 * * *'   # 17:17 KST
    # - cron: '17 11 * * *'  # 20:17 KST — 저녁 골든 직격
  workflow_dispatch:
    inputs:
      skip_delay:
        description: '랜덤 딜레이 건너뛰기 (테스트용)'
        required: false
        default: 'false'
        type: boolean

# 포스팅 워크플로 동시 실행 금지 — 크론 지연으로 겹칠 때 중복 게시 방지
concurrency:
  group: threads-posting
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  manual-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run manual post
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID:      ${{ secrets.THREADS_USER_ID }}
          NAVER_CLIENT_ID:      ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET:  ${{ secrets.NAVER_CLIENT_SECRET }}
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
          GOOGLE_API_KEY:       ${{ secrets.GOOGLE_API_KEY }}
          GEMINI_API_KEY:       ${{ secrets.GOOGLE_API_KEY }}
          IMGBB_API_KEY:        ${{ secrets.IMGBB_API_KEY }}
          SKIP_DELAY:           ${{ github.event.inputs.skip_delay || 'false' }}
        run: python scripts/manual_post.py

      - name: Commit changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/feed.html || true
          git add data/product_registry.json data/feed_posts.json data/posted_ids.json || true
          git add data/manual_queue.json || true
          git add -A || true
          git diff --staged --quiet || git commit -m "manual: 수동 포스팅 $(date -u +%Y-%m-%d)"
          # rebase에서 theirs = 로컬 커밋(포스팅 데이터) 보존 — 충돌 시 데이터 유실 방지
          git pull --rebase -X theirs origin main
          git push || (git pull --rebase -X theirs origin main && git push)
