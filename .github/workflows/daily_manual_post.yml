name: Manual Post (12:05 KST)

on:
  schedule:
    - cron: '5 3 * * *'   # 03:05 UTC = 12:05 KST
  workflow_dispatch:
    inputs:
      skip_delay:
        description: '랜덤 딜레이 건너뛰기 (테스트용)'
        required: false
        default: 'false'
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  manual-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run manual post
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID:      ${{ secrets.THREADS_USER_ID }}
          NAVER_CLIENT_ID:      ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET:  ${{ secrets.NAVER_CLIENT_SECRET }}
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
          SKIP_DELAY:           ${{ github.event.inputs.skip_delay || 'false' }}
        run: python scripts/manual_post.py

      - name: Commit changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/feed.html || true
          git add data/product_registry.json data/feed_posts.json data/posted_ids.json || true
          git add data/manual_queue.json || true
          git diff --staged --quiet || git commit -m "manual: 수동 포스팅 $(date -u +%Y-%m-%d)"
          git add -u || true
          git pull --rebase origin main && git push
