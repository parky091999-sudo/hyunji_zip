name: Casual Post (일상글, 하루 2번)

on:
  schedule:
    - cron: '17 0 * * *'   # 09:17 KST (오전 슬롯)
    # 저녁 슬롯 3중화(2026-07-13): 기존 21:17 단일 크론이 GH 지연(3~4h)으로 새벽 도착
    # → 게이트(8~22시) 밖 → 저녁 일상글 전멸이었음(인사이트 실측: 발행 전부 13시대).
    # 유진(@jiniee_log) 실측상 저녁 20~22시 질문·국룰형이 최고 성과 — 이 시간대 복구 목적.
    - cron: '17 8 * * *'   # 17:17 KST — 지연 시 저녁 도착, 정시면 19시까지 대기
    - cron: '17 10 * * *'  # 19:17 KST
    - cron: '17 12 * * *'  # 21:17 KST (저녁 슬롯 — question 타입 강제, 댓글 골든타임)
  workflow_dispatch:

# 포스팅 워크플로 동시 실행 금지 — 크론 지연으로 겹칠 때 중복 게시 방지
concurrency:
  group: threads-posting
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  casual-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run casual post
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID:      ${{ secrets.THREADS_USER_ID }}
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
          GOOGLE_API_KEY:       ${{ secrets.GOOGLE_API_KEY }}
          SCHEDULE_CRON:        ${{ github.event.schedule }}
        run: python scripts/casual_post.py

      - name: Integrity check (post_text 잘림 사후 감지)
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID:      ${{ secrets.THREADS_USER_ID }}
        run: |
          python scripts/verify_posts.py; EXIT=$?
          [ $EXIT -eq 0 ] || [ $EXIT -eq 2 ] || exit $EXIT

      - name: Commit changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/last_casual_post.json data/feed_posts.json || true
          git add data/recent_posts.json data/product_registry.json || true
          # 무결성 체크(verify_posts)가 다른 추적 파일을 수정해도 rebase가 거부되지 않도록
          # 수정된 추적 파일 전부 스테이징 (2026-07-13 오전·저녁 push 연속 실패 원인)
          git add -u || true
          git diff --staged --quiet || git commit -m "casual: 일상글 포스팅 $(date -u +%Y-%m-%d)"
          git pull --rebase -X theirs origin main
          git push || (git pull --rebase -X theirs origin main && git push)
