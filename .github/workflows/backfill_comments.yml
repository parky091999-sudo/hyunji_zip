name: Backfill Link Comments (1회성)

on:
  workflow_dispatch:

concurrency:
  group: threads-posting
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backfill:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run backfill
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID:      ${{ secrets.THREADS_USER_ID }}
        run: python scripts/add_comments_to_posts.py
      - name: Commit replied state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/replied_comments.json || true
          git diff --staged --quiet || git commit -m "backfill: 기존 글 링크 댓글 추가"
          git pull --rebase -X theirs origin main
          git push || (git pull --rebase -X theirs origin main && git push)
