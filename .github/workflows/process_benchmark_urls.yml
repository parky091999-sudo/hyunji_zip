name: Process Benchmark URLs

on:
  workflow_dispatch:

jobs:
  process:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull latest (admin may have just pushed pending_benchmark_urls.json)
        run: git pull --rebase origin main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps

      - name: Process URLs
        env:
          NAVER_CLIENT_ID:     ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
        run: python scripts/process_benchmark_urls.py

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/manual_candidates.json data/pending_benchmark_urls.json data/collection_sources.json || true
          git diff --staged --quiet || git commit -m "url-process: 벤치마크 URL 처리 $(date -u +%Y-%m-%d)"
          git push
