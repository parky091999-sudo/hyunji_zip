name: Healthcheck & Auto-Recover (17:00 KST)

on:
  # schedule:  # 2026-07-19 EC2 크론 이관 — 재개 시 주석 해제
    # - cron: '17 10 * * *'  # 19:17 KST — auto 미게시 시 저녁 내 복구
  workflow_dispatch:

# 포스팅 워크플로 동시 실행 금지 — 크론 지연으로 겹칠 때 중복 게시 방지
concurrency:
  group: threads-posting
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  healthcheck:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Pull latest
        run: git pull --rebase origin main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright
        run: playwright install chromium --with-deps

      - name: Check and recover if not posted
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID:      ${{ secrets.THREADS_USER_ID }}
          NAVER_CLIENT_ID:      ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET:  ${{ secrets.NAVER_CLIENT_SECRET }}
          YOUTUBE_API_KEY:      ${{ secrets.YOUTUBE_API_KEY }}
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
          GOOGLE_API_KEY:       ${{ secrets.GOOGLE_API_KEY }}
          GEMINI_API_KEY:       ${{ secrets.GOOGLE_API_KEY }}
          IMGBB_API_KEY:        ${{ secrets.IMGBB_API_KEY }}
          SKIP_DELAY:           'true'
        run: python scripts/healthcheck.py

      - name: Commit changes (if any)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/feed.html || true
          git add data/product_registry.json data/feed_posts.json data/posted_ids.json || true
          git add -u || true
          git diff --staged --quiet || git commit -m "healthcheck: 누락 포스팅 복구 $(date -u +%Y-%m-%d)"
          git pull --rebase -X theirs origin main
          git push || (git pull --rebase -X theirs origin main && git push)
