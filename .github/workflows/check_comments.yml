name: Comment Check & Auto-Reply (6시간마다)

on:
  schedule:
    - cron: '0 */6 * * *'   # UTC 0/6/12/18시 = KST 9/15/21/3시
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-comments:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Pull latest
        run: git pull --rebase origin main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check and reply to comments
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID:      ${{ secrets.THREADS_USER_ID }}
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
        run: python scripts/check_comments.py

      - name: Commit changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/replied_comments.json || true
          git diff --staged --quiet || git commit -m "comments: 자동 대댓글 $(date -u +%Y-%m-%d-%H%M)"
          git pull --rebase -X theirs origin main
          git push || (git pull --rebase -X theirs origin main && git push)
