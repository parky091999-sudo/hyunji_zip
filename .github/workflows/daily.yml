name: Auto Post (08:05 KST)

on:
  schedule:
    - cron: '5 23 * * *'   # 23:05 UTC = 08:05 KST (기준)
    - cron: '5  2 * * *'   # 02:05 UTC = 11:05 KST (딜레이 보정 1차)
    - cron: '5  5 * * *'   # 05:05 UTC = 14:05 KST (딜레이 보정 2차)
    - cron: '5  8 * * *'   # 08:05 UTC = 17:05 KST (딜레이 보정 3차)
  workflow_dispatch:
    inputs:
      skip_delay:
        description: '랜덤 딜레이 건너뛰기 (테스트용)'
        required: false
        default: 'false'
        type: boolean

# 포스팅 워크플로 동시 실행 금지 — 크론 지연으로 겹칠 때 중복 게시 방지
concurrency:
  group: threads-posting
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  auto-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright
        run: playwright install chromium --with-deps

      - name: Run auto post
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID:      ${{ secrets.THREADS_USER_ID }}
          NAVER_CLIENT_ID:      ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET:  ${{ secrets.NAVER_CLIENT_SECRET }}
          YOUTUBE_API_KEY:      ${{ secrets.YOUTUBE_API_KEY }}
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
          GOOGLE_API_KEY:       ${{ secrets.GOOGLE_API_KEY }}
          GEMINI_API_KEY:       ${{ secrets.GOOGLE_API_KEY }}
          IMGBB_API_KEY:        ${{ secrets.IMGBB_API_KEY }}
          SKIP_DELAY:           ${{ github.event.inputs.skip_delay || 'false' }}
        run: python scripts/auto_post.py

      - name: Refresh tomorrow candidates (preselect)
        env:
          NAVER_CLIENT_ID:      ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET:  ${{ secrets.NAVER_CLIENT_SECRET }}
          YOUTUBE_API_KEY:      ${{ secrets.YOUTUBE_API_KEY }}
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
          GOOGLE_API_KEY:       ${{ secrets.GOOGLE_API_KEY }}
          GEMINI_API_KEY:       ${{ secrets.GOOGLE_API_KEY }}
          SKIP_DELAY:           'true'
        run: python scripts/preselect.py

      - name: Commit changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/feed.html || true
          git add data/product_registry.json data/feed_posts.json data/posted_ids.json || true
          git add -u || true
          git diff --staged --quiet || git commit -m "auto: daily pipeline $(date -u +%Y-%m-%d)"
          # rebase에서 theirs = 로컬 커밋(방금 기록한 포스팅 데이터) — 충돌 시 데이터 유실/중복포스팅 방지
          git pull --rebase -X theirs origin main
          git push || (git pull --rebase -X theirs origin main && git push)
