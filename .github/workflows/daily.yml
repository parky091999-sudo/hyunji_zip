name: Auto Post (08:05 KST)

on:
  # schedule:  # 2026-07-19 EC2 크론 이관 — 재개 시 주석 해제
    # - cron: '17 14 * * *'  # 23:17 KST — 지연(실측 7~12h) 시 다음날 점심대 도착
    # - cron: '17 17 * * *'  # 02:17 KST
    # - cron: '17 20 * * *'  # 05:17 KST
    # - cron: '17 23 * * *'  # 08:17 KST — 지연 0이어도 게이트가 11시까지 대기 후 게시
  workflow_dispatch:
    inputs:
      skip_delay:
        description: '랜덤 딜레이 건너뛰기 (테스트용)'
        required: false
        default: 'false'
        type: boolean

# 포스팅 워크플로 동시 실행 금지 — 크론 지연으로 겹칠 때 중복 게시 방지
concurrency:
  group: threads-posting
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  auto-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 동시 실행은 concurrency가 막지만, 순차 실행 시 checkout이 이전 워크플로 push를 못 본 채로
      # 게이트를 통과해 중복 게시한 사고(2026-06-16 [027] 매직키보드/휴지통) 재발 방지.
      - name: Pull latest before posting
        run: git pull --rebase origin main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright
        run: playwright install chromium --with-deps

      - name: Run auto post
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID:      ${{ secrets.THREADS_USER_ID }}
          NAVER_CLIENT_ID:      ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET:  ${{ secrets.NAVER_CLIENT_SECRET }}
          YOUTUBE_API_KEY:      ${{ secrets.YOUTUBE_API_KEY }}
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
          GOOGLE_API_KEY:       ${{ secrets.GOOGLE_API_KEY }}
          GEMINI_API_KEY:       ${{ secrets.GOOGLE_API_KEY }}
          IMGBB_API_KEY:        ${{ secrets.IMGBB_API_KEY }}
          SKIP_DELAY:           ${{ github.event.inputs.skip_delay || 'false' }}
        run: python scripts/auto_post.py

      - name: Integrity check (short_name·post_text 자동 수정)
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID:      ${{ secrets.THREADS_USER_ID }}
        run: |
          python scripts/verify_posts.py; EXIT=$?
          [ $EXIT -eq 0 ] || [ $EXIT -eq 2 ] || exit $EXIT

      - name: Refresh tomorrow candidates (preselect)
        env:
          NAVER_CLIENT_ID:      ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET:  ${{ secrets.NAVER_CLIENT_SECRET }}
          YOUTUBE_API_KEY:      ${{ secrets.YOUTUBE_API_KEY }}
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
          GOOGLE_API_KEY:       ${{ secrets.GOOGLE_API_KEY }}
          GEMINI_API_KEY:       ${{ secrets.GOOGLE_API_KEY }}
          SKIP_DELAY:           'true'
        run: python scripts/preselect.py

      - name: Commit changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/feed.html || true
          git add data/product_registry.json data/feed_posts.json data/posted_ids.json || true
          git add -u || true
          git diff --staged --quiet || git commit -m "auto: daily pipeline $(date -u +%Y-%m-%d)"
          # rebase에서 theirs = 로컬 커밋(방금 기록한 포스팅 데이터) — 충돌 시 데이터 유실/중복포스팅 방지
          git pull --rebase -X theirs origin main
          git push || (git pull --rebase -X theirs origin main && git push)
