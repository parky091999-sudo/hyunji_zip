name: Weekly Benchmark Scan (Sun 23:00 KST)

on:
  schedule:
    - cron: '0 14 * * 0'   # 14:00 UTC Sunday = 23:00 KST Sunday
  workflow_dispatch:

jobs:
  benchmark-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run full benchmark scan
        env:
          NAVER_CLIENT_ID:     ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
        run: python scripts/full_benchmark_scan.py

      - name: Commit manual_candidates.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/manual_candidates.json || true
          git diff --staged --quiet || git commit -m "scan: 수동 후보 리스트 업데이트 $(date -u +%Y-%m-%d)"
          git push
